<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced VR Earthquake Simulator</title>
    <!-- Core A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
        // Global Simulation State Machine
        window.Simulation = {
            state: 'INITIALIZING', // INITIALIZING -> WAITING -> QUAKE -> SAFE/CRUSHED -> OVER
            quakeIntensity: 0,
            hasPlayedAudio: false
        };

        // Synthesize dynamic 3D Spatial Audio for Deep Earthquake Rumbling
        function playDeepRumble() {
            if(window.Simulation.state !== 'QUAKE' && window.Simulation.state !== 'SAFE') return;
            
            let actx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Primary Low frequency rumble
            let osc1 = actx.createOscillator();
            let gain1 = actx.createGain();
            osc1.type = 'sawtooth';
            // Randomize deep frequency between 30Hz and 60Hz to simulate ground shaking
            osc1.frequency.setValueAtTime(30 + Math.random() * 30, actx.currentTime);
            
            // Modulation LFO to make it sound chaotic and uneven
            let osc2 = actx.createOscillator();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(2 + Math.random() * 5, actx.currentTime); // 2-7 Hz pulse
            
            let modGain = actx.createGain();
            modGain.gain.setValueAtTime(20, actx.currentTime); // depth of modulation
            
            osc2.connect(modGain);
            modGain.connect(osc1.frequency);
            
            // Master volume tied to the physical quake intensity math
            let vol = (window.Simulation.quakeIntensity / 10) * 0.5;
            gain1.gain.setValueAtTime(vol, actx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.3);
            
            osc1.connect(gain1);
            gain1.connect(actx.destination);
            
            osc1.start(); osc2.start();
            osc1.stop(actx.currentTime + 0.3); osc2.stop(actx.currentTime + 0.3);
            
            // Trigger next rumble phase recursively
            setTimeout(playDeepRumble, 200 + Math.random() * 100);
        }

        /* ==============================================
           1. EARTHQUAKE PHYSICS & EVENT CONTROLLER
           ============================================== */
        AFRAME.registerComponent('earthquake-manager', {
            init: function() {
                this.cameraRig = document.querySelector('#camera-rig');
                this.basePos = this.cameraRig.object3D.position.clone();
                this.hudText = document.querySelector('#hud-text');
                
                // Set state to waiting
                window.Simulation.state = 'WAITING';

                // We wait for the user to click anywhere to start the simulation (required for audio context)
                window.addEventListener('click', () => {
                    if (window.Simulation.state === 'WAITING') {
                        this.startQuake();
                    }
                }, {once: true});
            },
            
            startQuake: function() {
                window.Simulation.state = 'QUAKE';
                window.Simulation.quakeIntensity = 2; // Tremors start small
                
                this.hudText.setAttribute('text', 'value: SEISMIC ACTIVITY DETECTED!\nFIND COVER UNDER A STURDY DESK IMMEDIATELY!');
                this.hudText.setAttribute('text', 'color', '#FF3333');
                
                if(!window.Simulation.hasPlayedAudio) {
                    window.Simulation.hasPlayedAudio = true;
                    playDeepRumble();
                }
                
                // Dynamic Intensity Ramp-up (Scaling the Disaster)
                setTimeout(() => { window.Simulation.quakeIntensity = 5; }, 4000); // 4 secs: medium
                
                setTimeout(() => { 
                    window.Simulation.quakeIntensity = 10; // 9 secs: catastrophic
                    this.triggerMajorCollapse();
                }, 9000); 
                
                // End Quake sequence
                setTimeout(() => {
                    if(window.Simulation.state === 'QUAKE' || window.Simulation.state === 'SAFE') {
                        window.Simulation.quakeIntensity = 0;
                        window.Simulation.state = 'OVER';
                        this.hudText.setAttribute('text', 'value: QUAKE SUBSIDED. IT IS SAFE TO EVACUATE.');
                        this.hudText.setAttribute('text', 'color', '#00FFCC');
                        
                        // Stop camera swinging if they are still alive
                        this.cameraRig.removeAttribute('animation__squat');
                    }
                }, 22000); // 22 seconds total simulation
            },

            tick: function(t, dt) {
                // Apply violent rotational and positional shaking to camera rig while preserving base offset
                if((window.Simulation.state === 'QUAKE' || window.Simulation.state === 'SAFE') && window.Simulation.quakeIntensity > 0) {
                    let amt = window.Simulation.quakeIntensity * 0.05;
                    
                    // Math.random positional shifts
                    let rx = (Math.random() - 0.5) * amt;
                    let rz = (Math.random() - 0.5) * amt;
                    let ry = (Math.random() - 0.5) * (amt * 0.3); // vertical bounce
                    
                    // Update camera rig position smoothly to avoid motion-sickness tear
                    this.cameraRig.object3D.position.set(
                        this.basePos.x + rx,
                        this.basePos.y + ry,
                        this.basePos.z + rz
                    );
                }
            },

            triggerMajorCollapse: function() {
                // 1. Physically drop ceiling infrastructure
                let ceilingNode = document.querySelector('#ceiling-tiles');
                if(ceilingNode) {
                    ceilingNode.setAttribute('animation', 'property: position; to: 0 -3.5 0; dur: 600; easing: easeInQuad');
                    ceilingNode.setAttribute('animation__rot', 'property: rotation; to: 15 5 -10; dur: 600');
                }
                
                // 2. Swing hanging lights via procedural physics simulation approximation
                let lights = document.querySelectorAll('.hanging-light');
                lights.forEach(l => {
                    l.setAttribute('animation', 'property: rotation; to: 45 0 0; dir: alternate; dur: 800; loop: true; easing: easeInOutSine');
                    
                    // Light flickering effect
                    let pointLight = l.querySelector('a-light');
                    if(pointLight) {
                        pointLight.setAttribute('animation__flicker', 'property: intensity; to: 0.1; dir: alternate; dur: 100; loop: true');
                    }
                });
                
                // 3. Topple the heavy bookshelf
                let bookshelf = document.querySelector('#bookshelf');
                bookshelf.setAttribute('animation', 'property: rotation; to: 90 0 0; dur: 800; easing: easeInQuad');
                bookshelf.setAttribute('animation__pos', 'property: position; to: 4 0.5 1; dur: 800; easing: easeInQuad');

                // 4. Survival Check Logic
                // If the player did not successfully get under the desk in time, the roof crushes them.
                setTimeout(() => {
                    if(window.Simulation.state === 'QUAKE') { // State QUAKE means they are not in SAFE zone
                        window.Simulation.state = 'CRUSHED';
                        this.hudText.setAttribute('text', 'value: SIMULATION FAILED. YOU WERE HIT BY DEBRIS. YOU MUST "DROP, COVER, AND HOLD ON".');
                        this.hudText.setAttribute('text', 'color', '#FF0000');
                        
                        // Turn sky pure red and drop camera to floor simulate failure
                        document.querySelector('#main-sky').setAttribute('color', '#500000');
                        this.cameraRig.setAttribute('animation__die', 'property: position; to: 0 -1.4 0; dur: 500; easing: easeInQuad');
                        this.basePos.y = -1.4; // lock rigged offset to ground
                    }
                }, 1000); // 1 second after collapse begins
            }
        });

        /* ==============================================
           2. SAFE ZONE (DROP AND COVER) MECHANICS
           ============================================== */
        AFRAME.registerComponent('safe-zone', {
            init: function() {
                // When the user looks heavily at the desk safe-zone box
                this.el.addEventListener('click', () => {
                    if(window.Simulation.state === 'QUAKE') {
                        
                        window.Simulation.state = 'SAFE';
                        let camRig = document.querySelector('#camera-rig');
                        let man = document.querySelector('earthquake-manager');
                        
                        // Physically teleport and animate the player crouching under the desk
                        camRig.setAttribute('animation__squat', 'property: position; to: -2 0.3 -2; dur: 800; easing: easeInOutQuad');
                        
                        // Update base pos for the camera rig so the earthquake math shakes them relative to their new spot
                        let m = document.querySelector('a-scene').components['earthquake-manager'];
                        m.basePos.set(-2, 0.3, -2);
                        
                        // Update HUD and remove targeting reticle to simulate holding on
                        document.querySelector('#hud-text').setAttribute('text', 'value: HOLD ON TIGHT. WAIT FOR THE SHAKING TO STOP.');
                        document.querySelector('#hud-text').setAttribute('text', 'color', '#00FF00');
                        document.querySelector('#crosshair').setAttribute('visible', 'false'); 
                    }
                });
            }
        });

    </script>
</head>
<body>
    <a-scene background="color: #020202" shadow="type: pcfsoft" renderer="colorManagement: true; antialias: true" earthquake-manager>
        
        <a-sky id="main-sky" color="#050505"></a-sky>

        <a-assets>
            <img id="wood" src="https://cdn.aframe.io/a-painter/images/floor.jpg" crossorigin="anonymous">
        </a-assets>

        <!-- ================= THE OFFICE ENVIRONMENT ================= -->
        <a-entity id="room">
            <!-- Floor -->
            <a-plane rotation="-90 0 0" width="12" height="12" color="#2c3e50" shadow="receive: true"></a-plane>
            <!-- Ceiling (Base layer) -->
            <a-plane position="0 4 0" rotation="90 0 0" width="12" height="12" color="#111" shadow="receive: true"></a-plane>
            
            <!-- Concrete Walls -->
            <a-plane position="0 2 -6" width="12" height="4" color="#1a252f" shadow="receive: true"></a-plane>
            <a-plane position="0 2 6" rotation="0 180 0" width="12" height="4" color="#1a252f" shadow="receive: true"></a-plane>
            <a-plane position="-6 2 0" rotation="0 90 0" width="12" height="4" color="#1a252f" shadow="receive: true"></a-plane>
            <a-plane position="6 2 0" rotation="0 -90 0" width="12" height="4" color="#1a252f" shadow="receive: true"></a-plane>

            <!-- Destructible Dropping Ceiling Array -->
            <a-entity id="ceiling-tiles" position="0 4 0">
                <a-plane position="0 -0.05 0" rotation="90 0 0" width="6" height="6" color="#777" material="src: #wood; repeat: 6 6" shadow="cast: true"></a-plane>
            </a-entity>

            <!-- Suspended Fluorescent Lighting (Physics enabled swinging during quake) -->
            <a-entity class="hanging-light" position="-3 4 -2">
                <a-cylinder radius="0.02" height="1" position="0 -0.5 0" color="#111"></a-cylinder>
                <a-box position="0 -1 0" width="2" height="0.1" depth="0.3" color="#EEE" material="emissive: #FFF; emissiveIntensity: 0.6">
                    <a-light type="point" intensity="1.5" distance="15" color="#FFF" shadow="cast: true"></a-light>
                </a-box>
            </a-entity>
            <a-entity class="hanging-light" position="3 4 2">
                <a-cylinder radius="0.02" height="1" position="0 -0.5 0" color="#111"></a-cylinder>
                <a-box position="0 -1 0" width="2" height="0.1" depth="0.3" color="#EEE" material="emissive: #FFF; emissiveIntensity: 0.6">
                    <a-light type="point" intensity="1.5" distance="15" color="#FFF" shadow="cast: true"></a-light>
                </a-box>
            </a-entity>

            <!-- Toppling Heavy Bookshelf Hazard -->
            <a-entity id="bookshelf" position="4.5 1.5 -1.5">
                <a-box width="1" height="3" depth="2" color="#5C4033" material="src: #wood" shadow="cast: true; receive: true"></a-box>
            </a-entity>

            <!-- Safe Zone Area: A heavy duty wooden desk -->
            <a-entity id="sturdy-desk" position="-2 0 -2">
                <!-- Desk Surface -->
                <a-box position="0 0.8 0" width="2.4" height="0.1" depth="1.4" color="#8B5A2B" material="src: #wood; roughness: 0.9" shadow="cast: true; receive: true"></a-box>
                <!-- Legs -->
                <a-cylinder position="-1.1 0.4 -0.6" radius="0.06" height="0.8" color="#333" shadow="cast: true"></a-cylinder>
                <a-cylinder position="1.1 0.4 -0.6" radius="0.06" height="0.8" color="#333" shadow="cast: true"></a-cylinder>
                <a-cylinder position="-1.1 0.4 0.6" radius="0.06" height="0.8" color="#333" shadow="cast: true"></a-cylinder>
                <a-cylinder position="1.1 0.4 0.6" radius="0.06" height="0.8" color="#333" shadow="cast: true"></a-cylinder>
                
                <!-- The hitbox that is gazed at to trigger hiding underneath -->
                <!-- The 'fuseTimeout: 1500' on the cursor requires the user to stare at this for 1.5s straight to dive under -->
                <a-box class="clickable" safe-zone position="0 0.4 0" width="2.2" height="0.8" depth="1.2" material="opacity: 0"></a-box>
                
                <!-- Glowing indicator -->
                <a-text value="STURDY DESK\nHIDE UNDER HERE" position="0 1.2 0" align="center" scale="0.6 0.6 0.6" color="#00FFCC" font="kelsonsans"></a-text>
                <!-- Downward Arrow pointing beneath desk -->
                <a-cone position="0 0.5 0.8" rotation="-90 0 0" radius-bottom="0.1" radius-top="0.01" height="0.3" color="#00FFCC" material="emissive: #00FFCC; emissiveIntensity: 0.5"
                        animation="property: position; to: 0 0.3 0.8; dir: alternate; loop: true; dur: 500"></a-cone>
            </a-entity>
        </a-entity>


        <!-- ================= ADVANCED CAMERA RIG & HEAD-UP DISPLAY ================= -->
        <!-- We wrap the camera in a rig. We manipulate this rig's transform via JS to shake the entire body 
             without fighting the user's localized HMD headset tracking math in VR space -->
        <a-entity id="camera-rig" position="0 0 2">
            
            <a-camera position="0 1.6 0">
                
                <!-- Eye-tracking reticle. Requires 1000ms stare to trigger -->
                <a-entity id="crosshair" cursor="fuse: true; fuseTimeout: 1000"
                          position="0 0 -1"
                          geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
                          material="color: #FFF; shader: flat; opacity: 0.8"
                          raycaster="objects: .clickable"
                          animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1000; from: 1 1 1; to: 0.1 0.1 0.1"
                          animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCubic; dur: 300; to: 1 1 1">
                </a-entity>
                
                <!-- Physical glass panel visor attached to head -->
                <a-entity position="0 -0.5 -1.5" geometry="primitive: plane; width: 3.5; height: 0.4" material="color: #000; opacity: 0.8; transparent: true">
                    <a-text id="hud-text" value="AWAITING SIMULATION START...\nCLICK ANYWHERE ON SCREEN TO BEGIN." align="center" position="0 0 0.01" color="#FFF" scale="0.6 0.6 0.6" font="kelsonsans"></a-text>
                </a-entity>
                
            </a-camera>
        </a-entity>

    </a-scene>
</body>
</html>
