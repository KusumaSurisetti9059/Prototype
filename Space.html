<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced VR Space Simulator</title>
    <!-- Core A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
        // Global Systems State for simulation speed tracking
        window.Simulation = { timeScale: 1 };

        /* =======================================================
           1. ADVANCED WEBGL SHADER: Plasma Generation
           ======================================================= */
        AFRAME.registerShader('plasma', {
            schema: {
                timeMsec: { type: 'time', is: 'uniform' }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                uniform float timeMsec;
                void main() {
                    float time = timeMsec / 2000.0;
                    vec2 p = -1.0 + 2.0 * vUv;
                    float r = sqrt(dot(p,p));
                    float a = atan(p.y, p.x);
                    
                    // Procedural noise math for rippling plasma
                    float noise = sin(14.0 * r - time * 4.0) * cos(6.0 * a + time * 2.0);
                    vec3 color = vec3(1.0, 0.35 + noise * 0.15, 0.0);
                    
                    // Masking to make it glow smoothly at the edges
                    float edge = 1.0 - smoothstep(0.8, 1.0, r);
                    gl_FragColor = vec4(color * edge, 1.0);
                }
            `
        });

        /* =======================================================
           2. ORBITAL MECHANICS ENGINE
           ======================================================= */
        AFRAME.registerComponent('orbit', {
            schema: {
                radius: { type: 'number', default: 10 },
                speed: { type: 'number', default: 1 }, // Degrees per second
                center: { type: 'vec3', default: { x: 0, y: 0, z: 0 } }
            },
            init: function () {
                // Spawn planets at a random degree in their orbit so they aren't lined up
                this.angle = Math.random() * Math.PI * 2;
            },
            tick: function (time, timeDelta) {
                // Math conversion for dynamic orbit dependent on user's Time Scale GUI
                let dt = timeDelta / 1000;
                this.angle += (this.data.speed * dt * window.Simulation.timeScale) * (Math.PI / 180);

                let x = this.data.center.x + this.data.radius * Math.cos(this.angle);
                let z = this.data.center.z + this.data.radius * Math.sin(this.angle);

                this.el.object3D.position.set(x, this.data.center.y, z);
            }
        });

        /* =======================================================
           3. ADVANCED AUTO-PILOT TRACKING CAMERA
           ======================================================= */
        AFRAME.registerComponent('follow-target', {
            schema: {
                target: { type: 'selector' },
                offset: { type: 'vec3', default: { x: 0, y: 5, z: 15 } }
            },
            tick: function (t, dt) {
                if (!this.data.target) return;

                var targetObj = this.data.target.object3D;
                var shipObj = this.el.object3D;

                var targetPos = new THREE.Vector3();
                targetObj.getWorldPosition(targetPos);

                // Add the viewing offset so we don't crash into the planet
                targetPos.x += this.data.offset.x;
                targetPos.y += this.data.offset.y;
                targetPos.z += this.data.offset.z;

                // Smooth frame-rate independent LERP (Linear Interpolation) to the moving target
                var lerpFactor = Math.min(1.0, dt * 0.003);
                shipObj.position.lerp(targetPos, lerpFactor);
            }
        });

        /* =======================================================
           4. PROCEDURAL GENERATORS (ASTEROIDS & STARS)
           ======================================================= */
        AFRAME.registerComponent('asteroid-belt', {
            schema: {
                count: { type: 'int', default: 500 },
                innerRadius: { type: 'number', default: 45 },
                beltWidth: { type: 'number', default: 12 }
            },
            init: function () {
                for (let i = 0; i < this.data.count; i++) {
                    let ast = document.createElement('a-dodecahedron');

                    let angle = Math.random() * Math.PI * 2;
                    let r = this.data.innerRadius + Math.random() * this.data.beltWidth;

                    let x = Math.cos(angle) * r;
                    let z = Math.sin(angle) * r;
                    let y = (Math.random() - 0.5) * 4; // Vertical scatter

                    ast.setAttribute('position', { x: x, y: y, z: z });
                    ast.setAttribute('radius', Math.random() * 0.4 + 0.1);
                    ast.setAttribute('color', '#666');
                    ast.setAttribute('material', 'roughness: 1; metalness: 0.2; flatShading: true');

                    // Complex local rotation
                    ast.setAttribute('rotation', { x: Math.random() * 360, y: Math.random() * 360, z: Math.random() * 360 });
                    this.el.appendChild(ast);
                }
            }
        });

        AFRAME.registerComponent('star-system', {
            init: function () {
                for (let i = 0; i < 1000; i++) {
                    let star = document.createElement('a-sphere');

                    // Spherically arraying the stars using advanced trig
                    let r = 200 + Math.random() * 100;
                    let theta = Math.random() * 2 * Math.PI;
                    let phi = Math.acos(2 * Math.random() - 1);

                    let x = r * Math.sin(phi) * Math.cos(theta);
                    let y = r * Math.sin(phi) * Math.sin(theta);
                    let z = r * Math.cos(phi);

                    star.setAttribute('position', { x: x, y: y, z: z });
                    star.setAttribute('radius', Math.random() * 0.3 + 0.1);

                    // Subtle variation in star colors (Blue, White, Yellow, Red dwarfs)
                    let colors = ['#FFFFFF', '#D6EAF8', '#FCF3CF', '#FADBD8'];
                    star.setAttribute('color', colors[Math.floor(Math.random() * colors.length)]);
                    star.setAttribute('material', 'shader: flat');
                    this.el.appendChild(star);
                }
            }
        });

        /* =======================================================
           5. INTERACTIVE DIEGETIC UI CONTROLS
           ======================================================= */
        AFRAME.registerComponent('nav-button', {
            schema: {
                target: { type: 'string' },
                offsetX: { type: 'number', default: 0 },
                offsetY: { type: 'number', default: 2 },
                offsetZ: { type: 'number', default: 8 },
                name: { type: 'string' }
            },
            init: function () {
                var el = this.el;
                el.addEventListener('mouseenter', () => el.setAttribute('color', '#00FFCC'));
                el.addEventListener('mouseleave', () => el.setAttribute('color', '#222'));

                el.addEventListener('click', () => {
                    // Reprogram Ship Auto-pilot targeting array
                    let ship = document.querySelector('#ship');
                    ship.setAttribute('follow-target', `target: ${this.data.target}; offset: ${this.data.offsetX} ${this.data.offsetY} ${this.data.offsetZ}`);

                    document.querySelector('#hud-target').setAttribute('text', `value: ORBITING: ${this.data.name}`);

                    // Audio beep synthesis
                    let synth = new AudioContext();
                    let o = synth.createOscillator();
                    let g = synth.createGain();
                    o.connect(g);
                    g.connect(synth.destination);
                    o.frequency.value = 800;
                    g.gain.exponentialRampToValueAtTime(0.00001, synth.currentTime + 0.3);
                    o.start(0);
                    o.stop(0.3);
                });
            }
        });

        AFRAME.registerComponent('time-button', {
            schema: { scale: { type: 'number' } },
            init: function () {
                var el = this.el;
                el.addEventListener('mouseenter', () => el.setAttribute('color', '#FFCC00'));
                el.addEventListener('mouseleave', () => el.setAttribute('color', '#222'));

                el.addEventListener('click', () => {
                    window.Simulation.timeScale = this.data.scale;
                    let text = this.data.scale === 0 ? "PAUSED" : this.data.scale + "x";
                    document.querySelector('#hud-time').setAttribute('text', `value: TIME SCALE: ${text}`);
                });
            }
        });
    </script>
</head>

<body>
    <a-scene background="color: #020205" renderer="antialias: true; colorManagement: true;">

        <a-assets>
            <!-- High Definition Maps -->
            <img id="tex-earth"
                src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/space/earth_atmos_4096.jpg"
                crossorigin="anonymous">
            <img id="tex-clouds"
                src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/space/earth_clouds_1024.png"
                crossorigin="anonymous">
            <img id="tex-moon"
                src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/space/moon_1024.jpg"
                crossorigin="anonymous">
        </a-assets>

        <!-- Deep Space Context -->
        <a-entity star-system></a-entity>
        <a-light type="ambient" color="#111"></a-light>

        <!-- ================= THE CELESTIAL ENGINE ================= -->
        <a-entity id="galaxy-center">

            <!-- THE SUN -->
            <!-- Driven entirely by WebGL shader calculation on GPU -->
            <a-entity id="sun-system" position="0 0 0">
                <a-sphere id="sun" radius="8" segments-width="64" segments-height="64"
                    material="shader: plasma"></a-sphere>
                <a-light type="point" position="0 0 0" color="#FFF" intensity="2.5" distance="1000" decay="1"></a-light>
                <a-sphere radius="8.5" material="color: #FF8800; opacity: 0.15; transparent: true; shader: flat"
                    side="back"></a-sphere>
            </a-entity>

            <!-- EARTH SYSTEM -->
            <!-- The system revolves around the sun, the child geometry rotates locally! -->
            <a-entity orbit="radius: 25; speed: 10;">
                <a-entity id="earth-system" position="0 0 0">
                    <a-sphere id="earth" radius="2" segments-width="64" segments-height="64"
                        material="src: #tex-earth; roughness: 0.8"
                        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
                    </a-sphere>
                    <!-- Atmospheric cloud depth layer -->
                    <a-sphere radius="2.05" segments-width="64" segments-height="64"
                        material="src: #tex-clouds; transparent: true; opacity: 0.6"
                        animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
                    </a-sphere>

                    <!-- THE MOON SYSTEM (Tied hierarchically to Earth Space) -->
                    <a-entity orbit="radius: 4; speed: 40;">
                        <a-sphere id="moon" radius="0.5" segments-width="32" segments-height="32"
                            material="src: #tex-moon; roughness: 1"
                            animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-sphere>
                    </a-entity>
                </a-entity>
            </a-entity>

            <!-- MARS -->
            <a-entity orbit="radius: 35; speed: 8;">
                <a-sphere id="mars" radius="1.3" segments-width="64" segments-height="64"
                    material="color: #D35400; roughness: 0.9"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear"></a-sphere>
            </a-entity>

            <!-- ASTEROID BELT -->
            <a-entity asteroid-belt="count: 500; innerRadius: 45; beltWidth: 12"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 60000; easing: linear"></a-entity>

            <!-- SATURN SYSTEM -->
            <a-entity orbit="radius: 65; speed: 4;">
                <a-entity id="saturn-system">
                    <a-sphere id="saturn" radius="3.5" segments-width="64" segments-height="64"
                        material="color: #F4D03F; roughness: 0.7"
                        animation="property: rotation; to: 0 360 0; loop: true; dur: 14000; easing: linear"></a-sphere>
                    <a-entity rotation="-20 0 0">
                        <a-ring radius-inner="5" radius-outer="6.5"
                            material="color: #E5E8E8; side: double; transparent: true; opacity: 0.7"></a-ring>
                        <a-ring radius-inner="6.7" radius-outer="8"
                            material="color: #BSB2B2; side: double; transparent: true; opacity: 0.4"></a-ring>
                    </a-entity>
                </a-entity>
            </a-entity>

        </a-entity>

        <!-- ================= MASTER CONTROL BRIDGE ================= -->
        <a-entity id="ship" follow-target="target: #sun-system; offset: 0 5 25">

            <a-entity position="0 0 0">
                <!-- Windshield Architecture -->
                <a-torus-knot radius="5" radius-tubular="0.05" p="1" q="3" color="#111"
                    position="0 0 -2"></a-torus-knot>

                <!-- Dashboard Structure -->
                <a-entity position="0 -1.5 -1.5" rotation="-20 0 0">
                    <a-cylinder color="#1a1a1a" radius="3" height="0.4" theta-start="-70" theta-length="140"
                        material="metalness: 0.8; roughness: 0.2" side="double"></a-cylinder>

                    <!-- HUD Displays -->
                    <a-text id="hud-target" value="ORBITING: THE SUN" align="center" position="-1 0.4 0" width="2"
                        color="#00FFCC" font="kelsonsans"></a-text>
                    <a-text id="hud-time" value="TIME SCALE: 1x" align="center" position="1 0.4 0" width="2"
                        color="#FFCC00" font="kelsonsans"></a-text>

                    <!-- Navigation Node UI -->
                    <a-entity position="-1 0.25 0.5">
                        <a-text value="SELECT TARGET" align="center" position="0 0.15 0" width="1.5"
                            color="#777"></a-text>

                        <a-entity class="clickable" geometry="primitive: box; width: 0.8; height: 0.15; depth: 0.1"
                            material="color: #222" position="0 0 0"
                            nav-button="target: #sun-system; offsetX: 0; offsetY: 5; offsetZ: 25; name: THE SUN">
                            <a-text value="SUN" align="center" position="0 0 0.06" width="1.5"></a-text>
                        </a-entity>
                        <a-entity class="clickable" geometry="primitive: box; width: 0.8; height: 0.15; depth: 0.1"
                            material="color: #222" position="0 -0.2 0"
                            nav-button="target: #earth-system; offsetX: 3; offsetY: 2; offsetZ: 10; name: EARTH">
                            <a-text value="EARTH" align="center" position="0 0 0.06" width="1.5"></a-text>
                        </a-entity>
                        <a-entity class="clickable" geometry="primitive: box; width: 0.8; height: 0.15; depth: 0.1"
                            material="color: #222" position="0 -0.4 0"
                            nav-button="target: #mars; offsetX: 2; offsetY: 1; offsetZ: 6; name: MARS">
                            <a-text value="MARS" align="center" position="0 0 0.06" width="1.5"></a-text>
                        </a-entity>
                        <a-entity class="clickable" geometry="primitive: box; width: 0.8; height: 0.15; depth: 0.1"
                            material="color: #222" position="0 -0.6 0"
                            nav-button="target: #saturn-system; offsetX: 5; offsetY: 3; offsetZ: 15; name: SATURN">
                            <a-text value="SATURN" align="center" position="0 0 0.06" width="1.5"></a-text>
                        </a-entity>
                    </a-entity>

                    <!-- Systems Node UI -->
                    <a-entity position="1 0.25 0.5">
                        <a-text value="TIME MODULATOR" align="center" position="0 0.15 0" width="1.5"
                            color="#777"></a-text>

                        <a-entity class="clickable" geometry="primitive: box; width: 0.8; height: 0.15; depth: 0.1"
                            material="color: #222" position="0 0 0" time-button="scale: 1">
                            <a-text value="1x SPEED" align="center" position="0 0 0.06" width="1.5"></a-text>
                        </a-entity>
                        <a-entity class="clickable" geometry="primitive: box; width: 0.8; height: 0.15; depth: 0.1"
                            material="color: #222" position="0 -0.2 0" time-button="scale: 5">
                            <a-text value="5x SPEED" align="center" position="0 0 0.06" width="1.5"></a-text>
                        </a-entity>
                        <a-entity class="clickable" geometry="primitive: box; width: 0.8; height: 0.15; depth: 0.1"
                            material="color: #222" position="0 -0.4 0" time-button="scale: 20">
                            <a-text value="20x SPEED" align="center" position="0 0 0.06" width="1.5"></a-text>
                        </a-entity>
                        <a-entity class="clickable" geometry="primitive: box; width: 0.8; height: 0.15; depth: 0.1"
                            material="color: #222" position="0 -0.6 0" time-button="scale: 0">
                            <a-text value="PAUSE" align="center" position="0 0 0.06" width="1.5"
                                color="#FF0000"></a-text>
                        </a-entity>
                    </a-entity>

                </a-entity>
            </a-entity>

            <!-- Diegetic Input Camera -->
            <a-camera id="ship-cam">
                <a-entity cursor="fuse: true; fuseTimeout: 1000" position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.007; radiusOuter: 0.012"
                    material="color: #FFF; shader: flat; opacity: 0.6" raycaster="objects: .clickable"
                    animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1"
                    animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1000; from: 1 1 1; to: 0.1 0.1 0.1">
                </a-entity>
            </a-camera>
        </a-entity>

    </a-scene>
</body>

</html>
