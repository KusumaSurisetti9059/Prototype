<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Trainee Model: CPR Simulator</title>
    <!-- Core A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
        // Global Medical State
        window.Simulation = {
            state: 'ASSESSING', // ASSESSING -> CPR -> STABILIZED / LOST
            heartRate: 45, // Patient starts dying rapidly
            compressions: 0,
            targetCompressions: 30
        };

        // Synthesize hospital heart monitor beeps using Web Audio API
        function playBeep(freq, dur, type = 'sine') {
            let actx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = actx.createOscillator();
            let gain = actx.createGain();

            osc.type = type;
            osc.frequency.setValueAtTime(freq, actx.currentTime);

            // Pop envelope
            gain.gain.setValueAtTime(0.1, actx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);

            osc.connect(gain);
            gain.connect(actx.destination);
            osc.start();
            osc.stop(actx.currentTime + dur);
        }

        // Recursive asynchronous monitor loop
        function runMonitor() {
            if (window.Simulation.state === 'LOST') {
                // Flatline
                document.querySelector('#ambient-light').setAttribute('color', '#FF0000');
                playBeep(400, 2, 'sawtooth');
                return; // Ends loop
            }

            // Pitch correlates with heart strength
            playBeep(400 + (window.Simulation.heartRate * 3), 0.15);

            // BPM to Millisecond delay calculation
            let delay = 300;

            if (window.Simulation.state === 'STABILIZED') {
                delay = 60000 / 80; // Stable 80 BPM
            } else {
                // Deteriorate heart rate over time constantly
                window.Simulation.heartRate -= 1;

                if (window.Simulation.heartRate <= 0) {
                    window.Simulation.state = 'LOST';
                    document.querySelector('#hud-text').setAttribute('text', 'value: PATIENT LOST. SIMULATION FAILED.');
                    document.querySelector('#hud-text').setAttribute('text', 'color', '#FF0000');
                    delay = 100;
                } else {
                    // Time between beats
                    delay = Math.max(300, 60000 / window.Simulation.heartRate);
                }
            }

            // Trigger next beat
            if (window.Simulation.state !== 'LOST') {
                setTimeout(runMonitor, delay);
            }
        }

        /* ==============================================
           1. CORE MEDICAL SYSTEM MANAGER
           ============================================== */
        AFRAME.registerComponent('medical-manager', {
            init: function () {
                this.hudText = document.querySelector('#hud-text');
                this.heartRateText = document.querySelector('#hud-heart');

                // Allow browsers to utilize audio context, starts simulation on first interaction
                window.addEventListener('click', () => {
                    if (!window.audioStarted) {
                        window.audioStarted = true;

                        this.hudText.setAttribute('text', 'value: PATIENT IN CARDIAC ARREST.\nINITIATE CHEST COMPRESSIONS IMMEDIATELY.');
                        this.hudText.setAttribute('text', 'color', '#FF3333');

                        runMonitor(); // Start ECG
                    }
                }, { once: true });
            },
            tick: function () {
                // Update HUD constantly with ECG logic
                if (window.Simulation.state === 'LOST') {
                    this.heartRateText.setAttribute('text', 'value: HEART RATE: FLATLINE');
                    this.heartRateText.setAttribute('text', 'color', '#FF0000');
                } else if (window.Simulation.state === 'STABILIZED') {
                    this.heartRateText.setAttribute('text', `value: HEART RATE: 80 BPM (STABLE)`);
                    this.heartRateText.setAttribute('text', 'color', '#00FF00');
                } else {
                    let color = window.Simulation.heartRate > 30 ? '#00FFCC' : '#FF0000';
                    this.heartRateText.setAttribute('text', `value: HEART RATE: ${window.Simulation.heartRate} BPM\nPATIENT DETERIORATING`);
                    this.heartRateText.setAttribute('text', 'color', color);
                }
            }
        });

        /* ==============================================
           2. CPR PHYSICAL INTERACTION LOGIC
           ============================================== */
        AFRAME.registerComponent('cpr-chest', {
            init: function () {
                var el = this.el;

                el.addEventListener('click', () => {
                    // Do nothing if game over
                    if (window.Simulation.state === 'STABILIZED' || window.Simulation.state === 'LOST') return;

                    if (window.Simulation.state === 'ASSESSING') {
                        window.Simulation.state = 'CPR'; // User has engaged
                    }

                    if (window.Simulation.state === 'CPR') {
                        window.Simulation.compressions++;

                        // Compressions physically force blood through body, artificially raising heart rate
                        window.Simulation.heartRate = Math.min(window.Simulation.heartRate + 3, 100);

                        // Physically deform the chest to simulate 2 inches of depth 
                        el.setAttribute('animation', 'property: position; to: 0 0.5 0.3; dur: 80; dir: alternate; loop: 1; easing: easeInOutSine');
                        document.querySelector('#dummy-torso').setAttribute('animation', 'property: scale; to: 1 0.95 1; dur: 80; dir: alternate; loop: 1');

                        // Update UI Target
                        document.querySelector('#hud-text').setAttribute('text', `value: COMPRESSIONS ADMINISTERED: ${window.Simulation.compressions} / 30`);
                        document.querySelector('#hud-text').setAttribute('text', 'color', '#FFCC00');

                        // Synthesis a heavy 'thud' for the chest compression
                        playBeep(100, 0.1, 'square');

                        // Check Victory Condition
                        if (window.Simulation.compressions >= window.Simulation.targetCompressions) {
                            window.Simulation.state = 'STABILIZED';
                            document.querySelector('#hud-text').setAttribute('text', 'value: PULSE RESTORED.\nPATIENT STABILIZED. EXCELLENT WORK.');
                            document.querySelector('#hud-text').setAttribute('text', 'color', '#00FF00');

                            // Visual success indicators
                            document.querySelector('#ambient-light').setAttribute('color', '#00FFCC');
                            el.removeAttribute('class'); // Disable further clicks
                        }
                    }
                });

                // Hover highlighting
                el.addEventListener('mouseenter', () => {
                    if (window.Simulation.state === 'CPR' || window.Simulation.state === 'ASSESSING') {
                        el.setAttribute('color', '#FF9900');
                    }
                });
                el.addEventListener('mouseleave', () => {
                    el.setAttribute('color', '#E74C3C');
                });
            }
        });

    </script>
</head>

<body>
    <a-scene background="color: #2C3E50" renderer="colorManagement: true; antialias: true" shadow="type: pcfsoft"
        medical-manager>

        <a-assets>
            <img id="med-tile" src="https://cdn.aframe.io/a-painter/images/floor.jpg" crossorigin="anonymous">
        </a-assets>

        <!-- ================= THE CLINICAL ENVIRONMENT ================= -->
        <!-- Extremely clean, sterile room to match a hospital/trauma bay -->
        <a-entity id="trauma-bay">
            <!-- Polished Floor -->
            <a-plane position="0 0 0" rotation="-90 0 0" width="15" height="15" color="#ECF0F1"
                material="roughness: 0.1; metalness: 0.1; src: #med-tile; repeat: 8 8" shadow="receive: true"></a-plane>
            <!-- White Ceiling -->
            <a-plane position="0 4 0" rotation="90 0 0" width="15" height="15" color="#FFF"></a-plane>

            <!-- Curtains / Walls -->
            <a-cylinder position="0 2 0" radius="5" height="4" color="#BDC3C7"
                material="side: double; opacity: 0.5; transparent: true; roughness: 1" theta-start="90"
                theta-length="180"></a-cylinder>

            <!-- Lighting Assembly -->
            <a-light id="ambient-light" type="ambient" color="#FFFFFF" intensity="0.6"></a-light>
            <!-- Stark surgical spot light shining on the patient -->
            <a-entity position="0 3.8 -2" rotation="-90 0 0">
                <a-light type="spot" color="#FFF" intensity="1.5" angle="45" penumbra="0.3" distance="10"
                    shadow="cast: true"></a-light>
                <a-cylinder radius="0.4" height="0.1" color="#F1C40F"></a-cylinder>
            </a-entity>
            <a-entity position="2 3.8 -1.5" rotation="-70 30 0">
                <a-light type="spot" color="#FFF" intensity="1" angle="30" penumbra="0.3" distance="10"
                    shadow="cast: true"></a-light>
                <a-cylinder radius="0.3" height="0.1" color="#F1C40F"></a-cylinder>
            </a-entity>
            <a-entity position="-2 3.8 -1.5" rotation="-70 -30 0">
                <a-light type="spot" color="#FFF" intensity="1" angle="30" penumbra="0.3" distance="10"
                    shadow="cast: true"></a-light>
                <a-cylinder radius="0.3" height="0.1" color="#F1C40F"></a-cylinder>
            </a-entity>
        </a-entity>


        <!-- ================= THE TRAINEE MODEL (MEDICAL DUMMY) ================= -->
        <!-- Positioned flat on the floor for CPR protocol -->
        <a-entity id="patient" position="0 0.1 -2" rotation="-90 0 0" shadow="cast: true; receive: true">

            <!-- Rubber Head -->
            <a-sphere position="0 1.5 0" radius="0.35" color="#E6B0AA"
                material="roughness: 0.9; metalness: 0"></a-sphere>

            <!-- Neck -->
            <a-cylinder position="0 1.15 0" radius="0.12" height="0.2" color="#E6B0AA"></a-cylinder>

            <!-- Main Torso -->
            <a-cylinder id="dummy-torso" position="0 0.3 0" radius="0.5" height="1.5" color="#3498DB"
                material="roughness: 0.7"></a-cylinder>

            <!-- INTERACTIVE COMPRESSION TARGET (The Sternum) -->
            <a-box id="chest" class="clickable" cpr-chest position="0 0.5 0.45" width="0.35" height="0.35" depth="0.2"
                color="#E74C3C" material="emissive: #E74C3C; emissiveIntensity: 0.4">
                <!-- Visual target reticle indicating where to place hands -->
                <a-ring radius-inner="0.08" radius-outer="0.12" position="0 0 0.11" color="#FFF" shader="flat"
                    animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; dur: 800; loop: true; easing: linear"></a-ring>
                <a-entity position="0 0 0.11" text="value: COMPRESS AREA; color: #FFF; align: center; width: 0.8"
                    rotation="0 0 0"></a-entity>
            </a-box>

            <!-- Arms -->
            <a-cylinder position="-0.65 0.5 -0.1" radius="0.12" height="1.4" rotation="0 0 15"
                color="#E6B0AA"></a-cylinder>
            <a-cylinder position="0.65 0.5 -0.1" radius="0.12" height="1.4" rotation="0 0 -15"
                color="#E6B0AA"></a-cylinder>

            <!-- Legs -->
            <a-cylinder position="-0.25 -1.2 0" radius="0.18" height="1.6" color="#2C3E50"></a-cylinder>
            <a-cylinder position="0.25 -1.2 0" radius="0.18" height="1.6" color="#2C3E50"></a-cylinder>

            <!-- Heart Monitor Equipment Box (Next to model) -->
            <a-box position="-1.5 0.5 0" width="0.8" height="0.6" depth="0.4" color="#111" rotation="0 0 30"
                shadow="cast: true"></a-box>
            <!-- EKG Display Screen -->
            <a-plane position="-1.5 0.52 0.21" width="0.7" height="0.5" color="#050505" rotation="0 0 30">
                <!-- Green sweeping line simulation -->
                <a-plane position="-0.3 0 0.01" width="0.1" height="0.05" color="#00FF00" material="shader: flat"
                    animation="property: position; to: 0.3 0 0.01; loop: true; dur: 1000; easing: linear"></a-plane>
            </a-plane>
        </a-entity>


        <!-- ================= ADVANCED CAMERA RIG ================= -->
        <!-- Looking downwards at the patient on the floor -->
        <a-entity id="camera-rig" position="0 1.2 0.5">
            <!-- Camera tilted down inherently for better UX -->
            <a-camera position="0 0 0" rotation="-30 0 0">

                <!-- Eye-tracking reticle. Fast fuseTimeout (200ms) allows rhythmic compressions simply by looking slightly away and back -->
                <a-entity id="crosshair" cursor="fuse: true; fuseTimeout: 200" position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
                    material="color: #FFF; shader: flat; opacity: 0.8" raycaster="objects: .clickable"
                    animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 100; from: 0.5 0.5 0.5; to: 1 1 1">
                </a-entity>

                <!-- Clinical Visor HUD -->
                <a-entity position="0 0.8 -2" geometry="primitive: plane; width: 2.8; height: 0.35"
                    material="color: #000; opacity: 0.8; transparent: true">
                    <a-text id="hud-heart" value="HEART RATE: MONITOR PENDING" align="center" position="0 0 0.01"
                        color="#00FFCC" font="kelsonsans" scale="0.8 0.8 0.8"></a-text>
                </a-entity>

                <a-entity position="0 -0.8 -2" geometry="primitive: plane; width: 3.2; height: 0.25"
                    material="color: #000; opacity: 0.8; transparent: true">
                    <a-text id="hud-text" value="AWAITING TRAINEE...\nCLICK OR TAP SCREEN TO BEGIN." align="center"
                        position="0 0 0.01" color="#FFF" scale="0.6 0.6 0.6"></a-text>
                </a-entity>

            </a-camera>
        </a-entity>

    </a-scene>
</body>

</html>
