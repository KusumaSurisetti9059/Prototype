<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced VR Disaster Management Simulator</title>
    <!-- Core A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
        // Global Game State Machine
        window.Simulation = {
            state: 'SEARCHING', // SEARCHING -> EXTINGUISHING -> ESCAPING -> WON / DEAD
            timeLeft: 60,
            fireHealth: 100,
        };

        // Synthesize dynamic 3D Spatial Audio for Alarm Beeps (Zero External Assets needed)
        function playAlarm() {
            if (window.Simulation.state === 'DEAD' || window.Simulation.state === 'WON') return;

            // Web Audio API
            let actx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = actx.createOscillator();
            let gain = actx.createGain();

            osc.type = 'sawtooth';
            // Classic two-tone siren sweep
            osc.frequency.setValueAtTime(800, actx.currentTime);
            osc.frequency.linearRampToValueAtTime(1200, actx.currentTime + 0.5);

            // Volume Envelope
            gain.gain.setValueAtTime(0.05, actx.currentTime); // keep volume reasonable
            gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.5);

            osc.connect(gain);
            gain.connect(actx.destination);
            osc.start();
            osc.stop(actx.currentTime + 0.5);

            // Loop the siren every second
            setTimeout(playAlarm, 1000);
        }

        // Browsers block audio until user interacts. We trap the very first click to jumpstart the siren.
        window.addEventListener('click', function initAudio() {
            if (!window.audioStarted) {
                window.audioStarted = true;
                playAlarm();
            }
        }, { once: true });

        /* ==============================================
           1. CORE GAMEPLAY AND SURVIVAL TIMER
           ============================================== */
        AFRAME.registerComponent('game-manager', {
            init: function () {
                this.timerEl = document.querySelector('#hud-timer');
                this.textEl = document.querySelector('#hud-text');

                setInterval(() => {
                    // Do not count down if game over
                    if (window.Simulation.state === 'WON' || window.Simulation.state === 'DEAD') return;

                    window.Simulation.timeLeft--;
                    this.timerEl.setAttribute('text', `value: TIME REMAINING: ${window.Simulation.timeLeft}s\nSURVIVE.`);

                    // Stress indication - make timer pulse red when under 15 seconds
                    if (window.Simulation.timeLeft <= 15) {
                        this.timerEl.setAttribute('animation', 'property: scale; to: 1.2 1.2 1.2; dir: alternate; loop: true; dur: 200');
                    }

                    // Failure State
                    if (window.Simulation.timeLeft <= 0) {
                        window.Simulation.state = 'DEAD';
                        this.textEl.setAttribute('text', 'value: SIMULATION FAILED. THE FIRE CONSUMED THE ROOM.');
                        this.textEl.setAttribute('text', 'color', '#FF0000');

                        // Turn world fully red to simulate disaster failure
                        document.querySelector('#main-sky').setAttribute('color', '#300000');
                        document.querySelector('#alarm-light').setAttribute('intensity', '0');
                    }
                }, 1000);
            }
        });

        /* ==============================================
           2. FIRST-PERSON EQUIPMENT MECHANICS
           ============================================== */
        AFRAME.registerComponent('extinguisher-pickup', {
            init: function () {
                var el = this.el;
                el.addEventListener('click', () => {
                    if (window.Simulation.state === 'SEARCHING') {
                        window.Simulation.state = 'EXTINGUISHING';
                        // Remove from the environment wall
                        el.setAttribute('visible', 'false');
                        el.removeAttribute('class');

                        // Equip to camera (First Person View)
                        document.querySelector('#fps-extinguisher').setAttribute('visible', 'true');

                        // Update UI
                        document.querySelector('#hud-text').setAttribute('text', 'value: EXTINGUISHER ACQUIRED! TARGET THE BASE OF THE FIRE.');
                        document.querySelector('#hud-text').setAttribute('text', 'color', '#00FFCC');
                        document.querySelector('#crosshair').setAttribute('material', 'color: #00FFCC');
                    }
                });
            }
        });

        /* ==============================================
           3. ADVANCED FIRE EXTINGUISHING LOGIC
           ============================================== */
        AFRAME.registerComponent('fire-target', {
            tick: function (t, dt) {
                // If user is actively spraying the fire with the extinguisher
                if (this.isSpraying && window.Simulation.state === 'EXTINGUISHING' && window.Simulation.fireHealth > 0) {

                    // Decrease fire health based on time delta
                    window.Simulation.fireHealth -= (dt / 30);

                    // Dynamically scale down the fire visual geometry
                    let scale = window.Simulation.fireHealth / 100;
                    this.el.setAttribute('scale', `${scale} ${scale} ${scale}`);

                    // Activate Foam Spray Particle Stream on the First-Person Extinguisher
                    document.querySelector('#foam-stream').setAttribute('visible', 'true');

                    // Victory Condition for Fire Phase
                    if (window.Simulation.fireHealth <= 0) {
                        window.Simulation.state = 'ESCAPING';

                        // Cleanup fire entirely
                        this.el.setAttribute('visible', 'false');
                        this.el.removeAttribute('class');
                        document.querySelector('#foam-stream').setAttribute('visible', 'false');

                        // Update UI
                        document.querySelector('#hud-text').setAttribute('text', 'value: FIRE CONTAINED! PROCEED TO EMERGENCY EXIT IMMEDIATELY.');
                        document.querySelector('#hud-text').setAttribute('text', 'color', '#00FFCC');

                        // Terminate the flashing red alarm state
                        document.querySelector('#alarm-light').removeAttribute('animation');
                        document.querySelector('#alarm-light').setAttribute('intensity', '0.5');
                        document.querySelector('#alarm-light').setAttribute('color', '#FFFFFF');
                    }
                } else {
                    // Safety turn off stream if not explicitly spraying
                    document.querySelector('#foam-stream').setAttribute('visible', 'false');
                }
            },
            init: function () {
                this.isSpraying = false;

                // Allow clicking, holding, or gazing
                this.el.addEventListener('mousedown', () => { this.isSpraying = true; });
                this.el.addEventListener('mouseup', () => { this.isSpraying = false; });
                this.el.addEventListener('mouseleave', () => { this.isSpraying = false; });

                // In pure VR gaze mode, looking at the fire actively engages the spray
                this.el.addEventListener('mouseenter', () => {
                    if (window.Simulation.state === 'EXTINGUISHING') this.isSpraying = true;
                });
            }
        });

        /* ==============================================
           4. EMERGENCY ESCAPE DOOR PROTOCOL
           ============================================== */
        AFRAME.registerComponent('exit-door', {
            init: function () {
                this.el.addEventListener('click', () => {
                    if (window.Simulation.state === 'ESCAPING') {
                        // Level Complete
                        window.Simulation.state = 'WON';
                        document.querySelector('#hud-text').setAttribute('text', 'value: EVACUATION SUCCESSFUL.\nEXCELLENT WORK TRAINEE!');
                        document.querySelector('#hud-text').setAttribute('text', 'color', '#00FF00');

                        // Smoothly animate the door opening on its hinge
                        document.querySelector('#door-hinge').setAttribute('animation', 'property: rotation; to: 0 90 0; dur: 1000; easing: easeInOutSine');
                        this.el.removeAttribute('class');

                    } else if (window.Simulation.state !== 'DEAD') {
                        // Protocol prevents exiting while fire is raging to prevent oxygen backdraft
                        document.querySelector('#hud-text').setAttribute('text', 'value: ACCESS DENIED: CONTAIN THE HAZARD FIRST TO PREVENT BACKDRAFT.');
                        document.querySelector('#hud-text').setAttribute('text', 'color', '#FF0000');
                    }
                });
            }
        });

        /* ==============================================
           5. PROCEDURAL SMOKE GENERATOR
           ============================================== */
        AFRAME.registerComponent('smoke-system', {
            init: function () {
                // Generates 40 smoke particles that rise and fade out dynamically
                for (let i = 0; i < 40; i++) {
                    let p = document.createElement('a-sphere');
                    p.setAttribute('radius', Math.random() * 0.6 + 0.3);
                    p.setAttribute('color', '#111');
                    p.setAttribute('material', 'shader: flat; opacity: 0.6; transparent: true');

                    let rx = (Math.random() - 0.5) * 2;
                    let rz = (Math.random() - 0.5) * 2;
                    p.setAttribute('position', `${rx} 0 ${rz}`);

                    let dur = 3000 + Math.random() * 2000;

                    // Rise to the ceiling
                    p.setAttribute('animation__move', `property: position; to: ${rx * 2} 4 ${rz * 2}; loop: true; dur: ${dur}; easing: linear`);
                    // Gradually disappear to look like dissipation
                    p.setAttribute('animation__fade', `property: components.material.material.opacity; from: 0.6; to: 0; loop: true; dur: ${dur}; easing: linear`);

                    this.el.appendChild(p);
                }
            }
        });

    </script>
</head>

<body>
    <!-- Setup scene with advanced lighting pipelines and shadow rendering -->
    <a-scene background="color: #050510" shadow="type: pcfsoft" renderer="colorManagement: true; antialias: true"
        game-manager>

        <!-- Deep Skybox -->
        <a-sky id="main-sky" color="#000" radius="100"></a-sky>

        <a-assets>
            <img id="wall-tex" src="https://cdn.aframe.io/a-painter/images/floor.jpg" crossorigin="anonymous">
        </a-assets>

        <!-- ================= MASTER ENVIRONMENT (Dynamic Shadows Enabled) ================= -->
        <!-- Floor -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#2c3e50"
            material="roughness: 0.9; src: #wall-tex; repeat: 10 10" shadow="receive: true"></a-plane>
        <!-- Ceiling -->
        <a-plane position="0 4 0" rotation="90 0 0" width="20" height="20" color="#111"
            shadow="receive: true"></a-plane>
        <!-- Chamber Walls -->
        <a-plane position="0 2 -10" width="20" height="4" color="#1a252f" material="src: #wall-tex; repeat: 5 1"
            shadow="receive: true"></a-plane>
        <a-plane position="0 2 10" rotation="0 180 0" width="20" height="4" color="#1a252f"
            shadow="receive: true"></a-plane>
        <a-plane position="-10 2 0" rotation="0 90 0" width="20" height="4" color="#1a252f"
            shadow="receive: true"></a-plane>
        <a-plane position="10 2 0" rotation="0 -90 0" width="20" height="4" color="#1a252f"
            shadow="receive: true"></a-plane>

        <!-- Room Debris and Obstacles (Cast stark shadows) -->
        <a-box position="3 0.5 -3" width="1" height="1" depth="3" color="#3e2723" material="roughness: 1"
            shadow="cast: true; receive: true" rotation="0 30 0"></a-box>
        <a-cylinder position="-2 0.5 4" radius="0.3" height="1" color="#7f8c8d"
            shadow="cast: true; receive: true"></a-cylinder>

        <!-- ================= PROCEDURAL LIGHTING ================= -->
        <!-- Extremely Dim ambient light to create a terrifying darkness -->
        <a-light type="ambient" color="#111"></a-light>

        <!-- Blinking Red Emergency Spotlight Casting Real-Time Shadows -->
        <a-light id="alarm-light" type="spot" position="0 3.8 0" rotation="-90 0 0" color="#FF0000" intensity="4"
            angle="60" penumbra="0.5" shadow="cast: true"
            animation="property: intensity; from: 4; to: 0.1; dir: alternate; loop: true; dur: 400"></a-light>

        <!-- Alarm casing visual -->
        <a-cylinder position="0 4 0" radius="0.2" height="0.1" color="#111">
            <a-sphere radius="0.15" material="color: #FF0000; emissive: #FF0000; emissiveIntensity: 1"
                animation="property: opacity; from: 1; to: 0.2; dir: alternate; loop: true; dur: 400"></a-sphere>
        </a-cylinder>


        <!-- ================= THE HAZARD: DYNAMIC FIRE ================= -->
        <a-entity id="fire-hazard" position="-5 0 -5">
            <!-- Burning, broken debris -->
            <a-box position="0 0.4 0" width="1.5" height="0.8" depth="1.5" color="#111"
                shadow="cast: true; receive: true" rotation="0 15 0"></a-box>
            <a-box position="0.5 0.6 0" width="2" height="0.2" depth="0.5" color="#222"
                shadow="cast: true; receive: true" rotation="10 -20 30"></a-box>

            <!-- Interactive Fire Hitbox and Core Element -->
            <a-entity class="clickable" fire-target id="fire-core" position="0 0.8 0">
                <!-- Large, invisible collision box for easy aiming in VR -->
                <a-sphere radius="2.5" material="opacity: 0" position="0 1.5 0"></a-sphere>

                <!-- Advanced multi-layered flickering flame geometry -->
                <a-sphere radius="1"
                    material="color: #FF3300; emissive: #FF3300; emissiveIntensity: 2; shader: flat; transparent: true; opacity: 0.9"
                    animation="property: scale; to: 1.1 1.3 1.1; dir: alternate; loop: true; dur: 150"></a-sphere>
                <a-sphere position="0.4 0.5 0" radius="0.7"
                    material="color: #FF9900; emissive: #FF9900; shader: flat; transparent: true; opacity: 0.8"
                    animation="property: scale; to: 1.2 1.5 1.2; dir: alternate; loop: true; dur: 200"></a-sphere>
                <a-sphere position="-0.3 0.6 0.3" radius="0.6"
                    material="color: #FFDD00; emissive: #FFDD00; shader: flat; transparent: true; opacity: 0.9"
                    animation="property: scale; to: 1.1 1.6 1.1; dir: alternate; loop: true; dur: 180"></a-sphere>

                <!-- Fire literally emits light onto the surrounding walls! -->
                <a-light type="point" color="#FF8800" intensity="2" distance="15" position="0 1 0"
                    shadow="cast: false"></a-light>

                <!-- Injection Point for Custom Javascript Smoke Particles -->
                <a-entity smoke-system position="0 1 0"></a-entity>
            </a-entity>
        </a-entity>


        <!-- ================= ENVIRONMENTAL SAFETY EQUIPMENT ================= -->
        <a-entity id="wall-extinguisher" position="8 1.5 -2" rotation="0 -90 0" class="clickable" extinguisher-pickup>
            <!-- Reflective wall plaque -->
            <a-plane width="1" height="1.5" position="0 0 -0.05" color="#FFF" shadow="receive: true"></a-plane>
            <a-text value="EXTINGUISHER" position="0 0.6 0" align="center" color="#FF0000" scale="0.5 0.5 0.5"
                font="kelsonsans"></a-text>

            <!-- Highly detailed extinguisher body -->
            <a-cylinder radius="0.15" height="0.6" color="#E74C3C" material="metalness: 0.6"
                shadow="cast: true"></a-cylinder>
            <a-cylinder position="0 0.35 0" radius="0.08" height="0.1" color="#AAA"></a-cylinder>
            <a-cylinder position="0 0.45 0" radius="0.04" height="0.1" color="#111"></a-cylinder>
            <a-box position="0.1 0.45 0" width="0.2" height="0.03" depth="0.03" color="#111"></a-box>

            <!-- Sleek hover selection highlight -->
            <a-ring radius-inner="0.3" radius-outer="0.35" material="color: #00FFCC; shader: flat"
                animation="property: rotation; to: 0 0 360; dur: 2000; loop: true; easing: linear"></a-ring>
        </a-entity>


        <!-- ================= EMERGENCY EXIT ARCHITECTURE ================= -->
        <a-entity position="0 0 9.9" rotation="0 180 0">
            <a-box position="0 1.6 -0.05" width="2.4" height="3.2" depth="0.1" color="#222"
                shadow="receive: true"></a-box>
            <!-- Glowing Exit Sign -->
            <a-box position="0 3.5 0.1" width="1.2" height="0.5" depth="0.1"
                material="color: #FFF; emissive: #FFF; emissiveIntensity: 0.5">
                <a-text value="EXIT" align="center" color="#2ECC71" position="0 0 0.06" font="kelsonsans"
                    scale="2 2 2"></a-text>
            </a-box>

            <a-entity id="door-hinge" position="-1.1 0 0">
                <a-box class="clickable" exit-door position="1.1 1.6 0" width="2.2" height="3" depth="0.05"
                    color="#27AE60" shadow="cast: true; receive: true">
                    <a-cylinder position="0.8 0 0.05" rotation="90 0 0" radius="0.04" height="0.15" color="#CCC"
                        shadow="cast: true"></a-cylinder>
                </a-box>
            </a-entity>
        </a-entity>

        <!-- ================= ADVANCED PLAYER HUD & CAMERA ================= -->
        <a-entity position="0 1.6 6">
            <a-camera id="main-camera">

                <!-- Highly responsive interactive crosshair -->
                <a-entity id="crosshair" cursor="fuse: true; fuseTimeout: 100" position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
                    material="color: #FFF; shader: flat; opacity: 0.8" raycaster="objects: .clickable"
                    animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 100; from: 0.5 0.5 0.5; to: 1 1 1">
                </a-entity>

                <!-- Diegetic UI Visor Panels rigidly attached to player head movement -->
                <a-entity position="0 0.8 -2" geometry="primitive: plane; width: 2.8; height: 0.25"
                    material="color: #000; opacity: 0.8; transparent: true">
                    <a-text id="hud-timer" value="TIME REMAINING: 60s" align="center" position="0 0 0.01"
                        color="#FF3333" font="kelsonsans" scale="0.8 0.8 0.8"></a-text>
                </a-entity>

                <a-entity position="0 -0.8 -2" geometry="primitive: plane; width: 3.2; height: 0.2"
                    material="color: #000; opacity: 0.8; transparent: true">
                    <a-text id="hud-text" value="ALARM SPOTTED! LOCATE THE FIRE EXTINGUISHER." align="center"
                        position="0 0 0.01" color="#FF3333" scale="0.6 0.6 0.6"></a-text>
                </a-entity>

                <!-- ================= FIRST-PERSON CHARACTER MODEL ================= -->
                <!-- Only visible when player physically picks up the item off the wall -->
                <!-- Model is strategically parented to the camera to simulate holding it in your hands -->
                <a-entity id="fps-extinguisher" position="0.5 -0.6 -1" rotation="-20 -20 10" visible="false">
                    <!-- Extinguisher Mesh -->
                    <a-cylinder radius="0.15" height="0.6" color="#E74C3C"
                        material="metalness: 0.8; roughness: 0.2"></a-cylinder>
                    <a-cylinder position="0 0.35 0" radius="0.08" height="0.1" color="#AAA"></a-cylinder>
                    <a-box position="-0.15 0.45 0" width="0.3" height="0.03" depth="0.04" color="#111"></a-box>
                    <a-cylinder position="-0.3 0.35 0" rotation="0 0 90" radius="0.03" height="0.3"
                        color="#111"></a-cylinder>

                    <!-- Dynamic Foam Spray Particle Stream (Only rendered when pulling fire trigger) -->
                    <a-entity id="foam-stream" position="-0.45 0.35 0" visible="false">
                        <a-cone radius-bottom="0.4" radius-top="0.02" height="4" rotation="0 0 90" position="-2 0 0"
                            material="color: #FFF; opacity: 0.5; transparent: true; shader: flat"
                            animation="property: opacity; to: 0.2; dir: alternate; loop: true; dur: 50"></a-cone>
                    </a-entity>
                </a-entity>

            </a-camera>
        </a-entity>

    </a-scene>
</body>

</html>
